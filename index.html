<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>分光光度儀對色系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,"Noto Sans TC",sans-serif}
input[type=number],input[type=text]{width:100%}
table td,table th{padding:2px 4px}
.tab{cursor:pointer;padding:8px 16px;border-radius:6px 6px 0 0}
.tabA{background:#1e3a5f;color:#fff}
.tabI{background:#e5e7eb;color:#374151}
</style>
</head>
<body class="bg-gray-100 p-3 text-xs">
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
 <div class="bg-white p-6 rounded-lg shadow w-72 text-center">
  <div class="font-bold text-base mb-3">分光光度儀對色系統</div>
  <div class="mb-2 text-left text-gray-600">請輸入密碼</div>
  <input id="pwInput" type="password" class="border p-2 rounded w-full mb-2" onkeydown="if(event.key==='Enter')tryLogin()">
  <div id="pwErr" class="hidden text-red-600 mb-2">密碼錯誤</div>
  <button class="bg-blue-600 text-white px-4 py-2 rounded w-full" onclick="tryLogin()">登入</button>
 </div>
</div>
<div id="app" class="max-w-6xl mx-auto space-y-2 hidden"></div>
<script>
const APP_PASSWORD='123456abc';
function tryLogin(){
 const v=document.getElementById('pwInput').value.trim();
 if(v===APP_PASSWORD){
  sessionStorage.setItem('cms_auth','1');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  if(window.__appInit){
   window.__appInit();
  }else{
   document.getElementById('app').innerHTML='<div class="p-4 text-red-600">系統模組尚未載入完成，請重新整理頁面。</div>';
  }
 }else{
  document.getElementById('pwErr').classList.remove('hidden');
 }
}
if(sessionStorage.getItem('cms_auth')==='1'){
 document.getElementById('loginScreen').classList.add('hidden');
 document.getElementById('app').classList.remove('hidden');
}
</script>
<script>
const CONCS=[0.2,0.5,1,3,5];
const BGS=[["white","白底"],["black","黑底"]];
const WL=Array.from({length:31},(_,i)=>400+i*10);
let DB={colorants:[],spectra:[]};
let ui={tab:'a',activeId:null};

function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function load(){try{DB=JSON.parse(localStorage.getItem('cms_db'))||{colorants:[],spectra:[]}}catch(e){DB={colorants:[],spectra:[]}}}
function save(){try{localStorage.setItem('cms_db',JSON.stringify(DB))}catch(e){alert('本地儲存空間已滿或寫入失敗，請清除部分資料')}}
function getSpec(cid,conc,bg){return DB.spectra.find(s=>s.colorant_id===cid&&s.concentration===conc&&s.bg_type===bg)}

function parseSpectralData(str) {
  if (!str) return [];
  return str.trim().split(/[\s,\t\r\n]+/).map(v => parseFloat(v)).filter(v => !isNaN(v));
}

function deltaE00(L1,a1,b1,L2,a2,b2){
 const C1=Math.hypot(a1,b1),C2=Math.hypot(a2,b2),Cbar=(C1+C2)/2;
 const G=0.5*(1-Math.sqrt(Math.pow(Cbar,7)/(Math.pow(Cbar,7)+Math.pow(25,7))));
 const a1p=a1*(1+G),a2p=a2*(1+G);
 const C1p=Math.hypot(a1p,b1),C2p=Math.hypot(a2p,b2);
 let h1p=Math.atan2(b1,a1p)*180/Math.PI;if(h1p<0)h1p+=360;
 let h2p=Math.atan2(b2,a2p)*180/Math.PI;if(h2p<0)h2p+=360;
 const dLp=L2-L1,dCp=C2p-C1p;
 let dhp=0;
 if(C1p*C2p!==0){dhp=h2p-h1p;if(dhp>180)dhp-=360;else if(dhp<-180)dhp+=360}
 const dHp=2*Math.sqrt(C1p*C2p)*Math.sin(dhp*Math.PI/360);
 const Lbar=(L1+L2)/2,Cbarp=(C1p+C2p)/2;
 let hbarp;
 if(C1p*C2p===0)hbarp=h1p+h2p;
 else hbarp=Math.abs(h1p-h2p)>180?(h1p+h2p+360)/2:(h1p+h2p)/2;
 const T=1-0.17*Math.cos((hbarp-30)*Math.PI/180)+0.24*Math.cos(2*hbarp*Math.PI/180)+0.32*Math.cos((3*hbarp+6)*Math.PI/180)-0.20*Math.cos((4*hbarp-63)*Math.PI/180);
 const dTheta=30*Math.exp(-Math.pow((hbarp-275)/25,2));
 const RC=2*Math.sqrt(Math.pow(Cbarp,7)/(Math.pow(Cbarp,7)+Math.pow(25,7)));
 const SL=1+(0.015*Math.pow(Lbar-50,2))/Math.sqrt(20+Math.pow(Lbar-50,2));
 const SC=1+0.045*Cbarp,SH=1+0.015*Cbarp*T;
 const RT=-Math.sin(2*dTheta*Math.PI/180)*RC;
 return Math.sqrt((dLp/SL)**2+(dCp/SC)**2+(dHp/SH)**2+RT*(dCp/SC)*(dHp/SH));
}

function render(){
 const app=document.getElementById('app');
 app.innerHTML=`
 <div class="flex justify-between items-center mb-1">
  <div class="text-gray-500">💾 本地儲存 (瀏覽器 localStorage)</div>
  <div class="space-x-2">
   <button class="bg-gray-700 text-white px-3 py-1 rounded" onclick="exportData()">匯出備份 (JSON)</button>
   <label class="bg-gray-500 text-white px-3 py-1 rounded cursor-pointer inline-block">
    匯入備份
    <input type="file" accept="application/json" class="hidden" onchange="importData(event)">
   </label>
  </div>
 </div>
 <div class="flex space-x-1">
  <div class="tab ${ui.tab==='a'?'tabA':'tabI'}" onclick="ui.tab='a';render()">1. 色漿與批號</div>
  <div class="tab ${ui.tab==='b'?'tabA':'tabI'}" onclick="ui.tab='b';render()">2. 數據錄入</div>
  <div class="tab ${ui.tab==='c'?'tabA':'tabI'}" onclick="ui.tab='c';render()">3. 對色修正</div>
  <div class="tab ${ui.tab==='d'?'tabA':'tabI'}" onclick="ui.tab='d';render()">4. 自動配方預測</div>
 </div>
 <div class="bg-white p-4 rounded-b-lg rounded-tr-lg shadow">${ui.tab==='a'?tabColorant():ui.tab==='b'?tabData():ui.tab==='c'?tabMatch():tabRecipe()}</div>`;
}

function exportData(){
 const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
 a.href=url;
 a.download=`色漿配色資料備份_${ts}.json`;
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
 URL.revokeObjectURL(url);
}

function importData(event){
 const file=event.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=e=>{
  try{
   const data=JSON.parse(e.target.result);
   if(!data||!Array.isArray(data.colorants)||!Array.isArray(data.spectra)){
    alert('檔案格式不正確，找不到 colorants 或 spectra 欄位');
    return;
   }
   const mode=confirm('按「確定」= 覆蓋目前所有資料\n按「取消」= 合併到目前資料(保留現有色漿，新增匯入的資料)');
   if(mode){
    DB=data;
   }else{
    const existIds=new Set(DB.colorants.map(c=>c.id));
    data.colorants.forEach(c=>{if(!existIds.has(c.id))DB.colorants.push(c)});
    const existSpecIds=new Set(DB.spectra.map(s=>s.id));
    data.spectra.forEach(s=>{if(!existSpecIds.has(s.id))DB.spectra.push(s)});
   }
   ui.activeId=null;
   save();render();
   alert('匯入完成');
  }catch(err){
   alert('讀取檔案失敗，請確認是先前匯出的 JSON 備份檔');
  }
  event.target.value='';
 };
 reader.readAsText(file);
}

function tabColorant(){
 let rows=DB.colorants.map(c=>`
  <tr class="${c.id===ui.activeId?'bg-blue-50':''}">
   <td><input type="radio" name="acol" ${c.id===ui.activeId?'checked':''} onclick="ui.activeId='${c.id}';render()"></td>
   <td>${c.name}</td><td>${c.lot_number}</td>
   <td><button class="text-red-600" onclick="delColorant('${c.id}')">刪除</button></td>
  </tr>`).join('');
 return `
 <div class="mb-3 flex space-x-2">
  <input id="ncName" type="text" placeholder="色漿名稱" class="border p-1 rounded w-40">
  <input id="ncLot" type="text" placeholder="批號" class="border p-1 rounded w-40">
  <button class="bg-blue-600 text-white px-3 rounded" onclick="addColorant()">新增</button>
 </div>
 <table class="w-full border-collapse"><thead><tr class="border-b font-bold">
  <th>選用</th><th>名稱</th><th>批號</th><th>操作</th></tr></thead>
  <tbody>${rows||'<tr><td colspan=4 class="text-gray-400 py-2">尚無色漿，請先新增</td></tr>'}</tbody></table>`;
}

function addColorant(){
 const name=document.getElementById('ncName').value.trim();
 const lot=document.getElementById('ncLot').value.trim();
 if(!name)return alert('請輸入色漿名稱');
 const id=uid('col_');
 DB.colorants.push({id,name,lot_number:lot});
 ui.activeId=id;save();render();
}
function delColorant(id){
 if(!confirm('確定刪除此色漿及其所有數據？'))return;
 DB.colorants=DB.colorants.filter(c=>c.id!==id);
 DB.spectra=DB.spectra.filter(s=>s.colorant_id!==id);
 if(ui.activeId===id)ui.activeId=null;
 save();render();
}

function tabData(){
 if(!ui.activeId)return '<div class="text-gray-400">請先於「色漿與批號」頁選擇一個色漿</div>';
 const col=DB.colorants.find(c=>c.id===ui.activeId);
 let rows='';
 for(const bg of BGS)for(const c of CONCS){
  const rec=getSpec(ui.activeId,c,bg[0])||{};
  const rid=`${c}_${bg[0]}`;
  const rStr=(rec.R||[]).join(',');
  rows+=`<tr class="border-b">
   <td>${c}%</td><td>${bg[1]}</td>
   <td><input id="L_${rid}" type="number" step="0.01" value="${rec.L??''}"></td>
   <td><input id="a_${rid}" type="number" step="0.01" value="${rec.a??''}"></td>
   <td><input id="b_${rid}" type="number" step="0.01" value="${rec.b??''}"></td>
   <td><input id="R_${rid}" type="text" placeholder="貼上 31 點光譜反射率 (支援空白、Tab 或逗號分隔)" value="${rStr}"></td>
   <td><button class="bg-green-600 text-white px-2 rounded" onclick="saveRow(${c},'${bg[0]}')">儲存</button></td>
  </tr>`;
 }
 return `<div class="mb-2 font-bold">目前色漿：${col.name} (批號 ${col.lot_number||'-'})</div>
 <table class="w-full border-collapse"><thead><tr class="border-b font-bold">
 <th>濃度</th><th>底色</th><th>L</th><th>a</th><th>b</th><th>反射率 R(400-700nm,31點)</th><th></th></tr></thead>
 <tbody>${rows}</tbody></table>`;
}

function saveRow(conc,bg){
 const rid=`${conc}_${bg}`;
 const L=parseFloat(document.getElementById(`L_${rid}`).value);
 const a=parseFloat(document.getElementById(`a_${rid}`).value);
 const b=parseFloat(document.getElementById(`b_${rid}`).value);
 const Rraw=document.getElementById(`R_${rid}`).value;
 let R=parseSpectralData(Rraw);
 if(Rraw && R.length!==31)return alert('反射率須為 31 個數值 (400-700nm，10nm 間隔)');
 if(isNaN(L)||isNaN(a)||isNaN(b))return alert('請輸入完整的 L a b 數值');
 let rec=getSpec(ui.activeId,conc,bg);
 if(!rec){rec={id:uid('sd_'),colorant_id:ui.activeId,concentration:conc,bg_type:bg};DB.spectra.push(rec);}
 rec.L=L;rec.a=a;rec.b=b;rec.R=R;
 save();alert('已儲存至本地');
}

function tabMatch(){
 const checkBoxes=DB.colorants.map(c=>`
  <label class="inline-flex items-center space-x-1 mr-2">
   <input type="checkbox" name="mcol" value="${c.id}" checked> ${c.name}
  </label>`).join('');
 return `
 <div class="space-y-2">
  <div class="font-bold border-b pb-1">第一步：勾選參與調色的色漿</div>
  <div>${checkBoxes||'<span class="text-gray-400">請先建立色漿</span>'}</div>

  <div class="font-bold border-b pb-1 pt-1">第二步：輸入目標與目前打樣數據</div>
  <div class="grid grid-cols-6 gap-2">
   <div class="col-span-3"><label class="block text-gray-600">目標色光譜 R (31點)</label>
   <input id="mtTarR" type="text" class="border p-1 rounded" placeholder="直接複製貼上光譜反射率數據"></div>
   <div class="col-span-3"><label class="block text-gray-600">目前第一次打樣光譜 R (31點)</label>
   <input id="mtTrialR" type="text" class="border p-1 rounded" placeholder="與上面同格式"></div>
  </div>

  <div class="font-bold border-b pb-1 pt-1">第三步：輸入當前打樣配方比例 (以英文逗號或空白分隔)</div>
  <input id="mtCurrentC" type="text" class="border p-1 rounded w-full" placeholder="例如: 1.5, 0.4, 2.1 (對應上方勾選順序)">

  <div class="flex items-center space-x-2 pt-1">
   <label class="text-gray-600">修色靈敏度 (阻尼係數)</label>
   <input id="mtDamping" type="range" min="0.1" max="1.0" step="0.1" value="0.5" class="w-32">
   <span id="mtDampingVal" class="font-bold text-blue-800">0.5</span>
  </div>

  <button class="bg-indigo-600 text-white px-4 py-1.5 rounded font-bold mt-2" onclick="runMultiMatch()">計算修色補正配方</button>
  <div id="multiMatchResult" class="mt-2 p-2 bg-gray-50 rounded border min-h-[50px]"></div>
 </div>`;
}

document.addEventListener('input', (e) => {
  if (e.target && e.target.id === 'mtDamping') {
    document.getElementById('mtDampingVal').innerText = e.target.value;
  }
});

function runMultiMatch(){
 const out=document.getElementById('multiMatchResult');
 const chks=Array.from(document.querySelectorAll('input[name="mcol"]:checked')).map(el=>el.value);
 const tarR=parseSpectralData(document.getElementById('mtTarR').value);
 const triR=parseSpectralData(document.getElementById('mtTrialR').value);
 const curC=parseSpectralData(document.getElementById('mtCurrentC').value);
 const damping=parseFloat(document.getElementById('mtDamping').value)||0.5;

 if(chks.length===0||tarR.length!==31||triR.length!==31||curC.length!==chks.length||tarR.some(isNaN)||triR.some(isNaN)||curC.some(isNaN)){
  out.innerHTML='<span class="text-red-600 font-bold">錯誤：請確認勾選的色漿數量與輸入的配方個數一致，且光譜數據必須為 31 點。</span>';
  return;
 }

 const dbData=chks.map(id=>computeUnitKS(id));
 const adjustment=new Array(chks.length).fill(0);

 for(let i=0;i<chks.length;i++){
  let diffSum=0;
  for(let w=0;w<31;w++){
   const dR=tarR[w]-triR[w];
   diffSum+=dR*dbData[i].K[w]*damping;
  }
  adjustment[i]=diffSum;
 }

 let html='<div class="font-bold text-blue-900 mb-1">複方修色加料建議：</div>';
 chks.forEach((id,i)=>{
  const col=DB.colorants.find(c=>c.id===id);
  const name=col?col.name:id;
  const action=adjustment[i]>=0?'<span class="text-red-600 font-bold">追加</span>':'<span class="text-green-600 font-bold">減少</span>';
  const absVal=Math.abs(adjustment[i]);
  const finalC=Math.max(0,curC[i]+adjustment[i]);
  html+=`<div>${name}：目前 ${curC[i]}% → 建議 ${action} ${absVal.toFixed(3)}% → 調整後新配方應為 <span class="underline font-bold">${finalC.toFixed(3)}%</span></div>`;
 });

 out.innerHTML=html;
}

function computeUnitKS(colorantId){
 const specs=DB.spectra.filter(s=>s.colorant_id===colorantId&&s.R&&s.R.length===31);
 const unitK=new Array(31).fill(0);
 const unitS=new Array(31).fill(0);
 const concs=[...new Set(specs.map(s=>s.concentration))];
 if(concs.length===0)return {K:unitK,S:unitS};
 for(let w=0;w<31;w++){
  let numK=0,numS=0,den=0;
  concs.forEach(c=>{
   const wSpec=specs.find(s=>s.concentration===c&&s.bg_type==='white');
   const bSpec=specs.find(s=>s.concentration===c&&s.bg_type==='black');
   if(wSpec&&bSpec){
    const Rw=Math.max(wSpec.R[w],1e-4);
    const Rb=Math.max(bSpec.R[w],1e-4);
    const a=0.5*(Rw+(Rb-Rw+1)/Rb);
    const b=Math.sqrt(Math.max(a*a-1,0));
    const S_conc=(b>0)?(1/b)*Math.log((1-Rb*(a-b))/(1-Rb*(a+b))):0;
    const K_conc=S_conc*(a-1);
    numK+=c*K_conc;numS+=c*S_conc;den+=c*c;
   }
  });
  unitK[w]=den>1e-9?numK/den:0;
  unitS[w]=den>1e-9?numS/den:0;
 }
 return {K:unitK,S:unitS};
}

function predictRecipe(colorantIds,targetR,maxTotal){
 maxTotal=maxTotal||10;
 const n=colorantIds.length;
 const dbData=colorantIds.map(id=>computeUnitKS(id));
 const K_sub=new Array(31).fill(0.01);
 const S_sub=new Array(31).fill(1.0);
 const targetKS=targetR.map(R=>{R=Math.max(R,1e-4);return (1-R)*(1-R)/(2*R);});
 let C=new Array(n).fill(0.1);
 const lr=0.005;
 const iters=2000;
 for(let it=0;it<iters;it++){
  const resid=new Array(31);
  for(let w=0;w<31;w++){
   let sumK=K_sub[w],sumS=S_sub[w];
   for(let i=0;i<n;i++){sumK+=C[i]*dbData[i].K[w];sumS+=C[i]*dbData[i].S[w];}
   const predKS=sumS>1e-9?sumK/sumS:0;
   resid[w]=predKS-targetKS[w];
  }
  for(let i=0;i<n;i++){
   let grad=0;
   for(let w=0;w<31;w++)grad+=dbData[i].K[w]*resid[w];
   C[i]-=lr*grad;
   if(C[i]<0)C[i]=0;
  }
  const sum=C.reduce((a,b)=>a+b,0);
  if(sum>maxTotal){
   const scale=maxTotal/sum;
   for(let i=0;i<n;i++)C[i]*=scale;
  }
 }
 return colorantIds.map((id,i)=>{
  const col=DB.colorants.find(c=>c.id===id);
  const rawPercent = Math.round(C[i]*1000)/1000;
  return {id,name:col?col.name:id,percent:rawPercent >= 0.01 ? rawPercent : 0};
 });
}

function tabRecipe(){
 return `
 <div class="mb-2">目標光譜 R(400-700nm,31點,貼上或空白分隔均可)</div>
 <input id="trSpec" type="text" class="border p-1 rounded w-full mb-2">
 <div class="flex items-center space-x-2 mb-2">
  <label>總濃度上限%</label><input id="trMax" type="number" value="10" class="border p-1 rounded w-24">
  <button class="bg-indigo-600 text-white px-4 py-1 rounded" onclick="runRecipePredict()">預測配方</button>
 </div>
 <div id="recipeResult" class="mt-2"></div>`;
}

function runRecipePredict(){
 const raw=document.getElementById('trSpec').value;
 const R=parseSpectralData(raw);
 const out=document.getElementById('recipeResult');
 if(R.length!==31||R.some(isNaN)){out.innerHTML='<div class="text-red-600">請輸入 31 個目標波長反射率</div>';return;}
 const maxTotal=parseFloat(document.getElementById('trMax').value)||10;
 const ids=DB.colorants.map(c=>c.id);
 if(ids.length===0){out.innerHTML='<div class="text-red-600">尚無色漿資料</div>';return;}
 const res=predictRecipe(ids,R,maxTotal);
 out.innerHTML=res.map(r=>`<div>${r.name}：<span class="font-bold text-indigo-700">${r.percent}%</span></div>`).join('');
}

window.__appInit=function(){
 load();
 render();
};
if(sessionStorage.getItem('cms_auth')==='1')window.__appInit();
</script>
</body>
</html>
